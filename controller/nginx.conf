# VISHWAAS Controller - nginx reverse proxy configuration
#
# Installation (Ubuntu/Debian):
#   sudo cp controller/nginx.conf /etc/nginx/sites-available/vishwaas
#   sudo ln -s /etc/nginx/sites-available/vishwaas /etc/nginx/sites-enabled/vishwaas
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumptions:
#   - TLS certificates at /etc/ssl/vishwaas/{fullchain.pem,privkey.pem}
#     (generate with: sudo certbot certonly --nginx -d dashboard.example.com)
#   - Frontend built to /opt/vishwaas/controller/frontend/dist/
#   - Backend running on 127.0.0.1:8000 (start with --prod flag)
#   - Prometheus scraper is either on localhost or in the VPN subnet 10.10.10.0/24

upstream vishwaas_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # ---- Replace with your actual hostname ----
    server_name dashboard.example.com;

    ssl_certificate     /etc/ssl/vishwaas/fullchain.pem;
    ssl_certificate_key /etc/ssl/vishwaas/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # ---- Rate limiting zones ----
    # Belt-and-suspenders alongside slowapi in the app layer
    limit_req_zone $binary_remote_addr zone=join_rl:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=20r/m;

    # ---- Frontend static files ----
    root /opt/vishwaas/controller/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- API proxy ----
    location /api/ {
        proxy_pass         http://vishwaas_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID $http_x_request_id;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;

        # Echo correlation ID back to client
        add_header X-Request-ID $upstream_http_x_request_id always;
    }

    # ---- Rate-limited endpoints ----
    location /api/request-join {
        limit_req zone=join_rl burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://vishwaas_backend/request-join;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/login {
        limit_req zone=auth_rl burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://vishwaas_backend/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Metrics: restrict to localhost and VPN subnet only ----
    location /api/metrics {
        allow 127.0.0.1;
        allow ::1;
        allow 10.10.10.0/24;   # VPN subnet — Prometheus scraper via VPN
        deny all;
        proxy_pass http://vishwaas_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---- Health probes (public — for load balancer / uptime monitor) ----
    location /api/health {
        proxy_pass http://vishwaas_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /api/ready {
        proxy_pass http://vishwaas_backend/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
